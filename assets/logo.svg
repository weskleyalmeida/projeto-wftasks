<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="wfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(37,99,235,0.3)"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#wfGrad)" filter="url(#shadow)"/>
  <!-- Speed lines (left) -->
  <line x1="10" y1="26" x2="22" y2="26" stroke="rgba(255,255,255,0.45)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="8"  y1="33" x2="22" y2="33" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="10" y1="40" x2="22" y2="40" stroke="rgba(255,255,255,0.45)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Check mark -->
  <polyline points="27,43 36,52 57,27" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
